services:
  blog:
    image: node:lts-alpine
    container_name: gnav-blog
    working_dir: /app
    volumes:
      - .:/app
    ports:
      - "1313:1313"
    # Lệnh: Cài Hugo mới nhất -> Cài thư viện -> Chạy web
    command: sh -c "apk add --no-cache hugo && npm install && hugo server --bind 0.0.0.0 --disableFastRender --poll 700ms"
